<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bethlehem Tourist Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #2c3e50; /* Dark modern background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. The Map Frame - Professional layout wrapping the map */
        .map-frame {
            width: 95%;
            height: 90vh;
            border: 8px solid #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Title Overlay Inside Frame */
        .map-title {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            border-radius: 6px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #2980b9;
        }
        .map-title h1 { margin: 0; font-size: 18px; color: #2c3e50; }
        .map-title p { margin: 4px 0 0 0; font-size: 11px; color: #7f8c8d; }

        /* 2. Styling for Popup Images - For the historic sites */
        .popup-image {
            width: 100%;
            max-width: 150px;
            height: auto;
            border-radius: 4px;
            margin-bottom: 5px;
            display: block;
        }

        /* 3. Styling for Map Legend (معالم الخريطة) */
        .legend {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            line-height: 18px;
            color: #333;
            border-radius: 6px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            font-size: 12px;
        }
        .legend h4 { margin: 0 0 8px 0; font-size: 13px; color: #2c3e50; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 0.8; border-radius: 50%; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .legend-item span { margin-left: 5px; }
    </style>
</head>
<body>

    <div class="map-frame">
        
        <div class="map-title">
            <h1>Bethlehem Tourist Map</h1>
            <p>Coverage: ~40 km² Buffer | HistoricalGIS Web App</p>
        </div>

        <div id="map"></div>
        
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Central Coordinates
        const bethlehemCenter = [31.7054, 35.2024];
        
        // Initialize Map
        const map = L.map('map', {
            zoomControl: true
        }).setView(bethlehemCenter, 14);

        // Standard Basemap Layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 1. Defining Tourist Locations with Data and Thumbnail Image URLs
        const sites = [
            { 
                name: "Church of the Nativity", 
                coords: [31.7043, 35.2076], 
                desc: "The birthplace of Jesus Christ.",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Birth_Place_of_Jesus_Church_of_Nativity.jpg/200px-Birth_Place_of_Jesus_Church_of_Nativity.jpg"
            },
            { 
                name: "Manger Square", 
                coords: [31.7046, 35.2062], 
                desc: "The main cultural square of Bethlehem.",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Manger_Square_Bethlehem_Palestine.jpg/200px-Manger_Square_Bethlehem_Palestine.jpg"
            },
            { 
                name: "The Milk Grotto", 
                coords: [31.7037, 35.2091], 
                desc: "Sacred stone grotto, part of the Nativity.",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Palestine_Milk_Grotto_Bethlehem.jpg/200px-Palestine_Milk_Grotto_Bethlehem.jpg"
            },
            { 
                name: "Shepherds' Field", 
                coords: [31.7028, 35.2341], 
                desc: "Located in Beit Sahour, east of the city.",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Palestine-Shepherds%27_Field-Bethlehem.jpg/200px-Palestine-Shepherds%27_Field-Bethlehem.jpg"
            },
            { 
                name: "Solomon's Pools", 
                coords: [31.6894, 35.1691], 
                desc: "Ancient historic water reservoirs.",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Palestine-Solomons_Pools-Bethlehem.jpg/200px-Palestine-Solomons_Pools-Bethlehem.jpg"
            }
        ];

        // 2. Add Markers with Dynamic Popup Content including IMAGES
        sites.forEach(function(site) {
            // Build the HTML content including the image
            const popupContent = `
                <strong style="color: #2980b9; font-size:14px;">${site.name}</strong><br>
                <img src="${site.img}" alt="${site.name}" class="popup-image" /><br>
                <p style="margin:5px 0 0 0; font-size:12px; color:#555;">${site.desc}</p>
            `;

            L.marker(site.coords)
                .addTo(map)
                .bindPopup(popupContent);
        });

        // Spatial Buffer to demonstrate the 40 sq km criteria
        L.circle(bethlehemCenter, {
            color: '#2980b9',
            fillColor: '#3498db',
            fillOpacity: 0.06,
            radius: 3500 
        }).addTo(map);

        // 3. Adding Legend (معالم ومفتاح الخريطة) Control to the map
        const legend = L.control({ position: 'bottomright' });

        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4>Map Legend</h4>';
            // Item 1: Buffer Area
            div.innerHTML += '<div class="legend-item"><i style="background: #3498db; border: 1px solid #2980b9; opacity: 0.4; border-radius: 0;"></i><span>40 km² Buffer Zone</span></div>';
            // Item 2: Markers
            div.innerHTML += '<div class="legend-item"><i style="background: #3870c5; width: 10px; height: 10px; border-radius: 50%;"></i><span>Tourist / Historic Site</span></div>';
            return div;
        };

        legend.addTo(map);
    </script>

</body>
</html>
